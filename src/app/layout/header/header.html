<header
  class="fixed top-0 left-0 right-0 z-50 transition-all duration-300"
  [class.bg-white]="scrolled() && !theme.isDark()"
  [class.dark:bg-neutral-950]="scrolled()"
  [class.shadow-sm]="scrolled()"
  [class.border-b]="scrolled()"
  [class.border-neutral-200]="scrolled() && !theme.isDark()"
  [class.dark:border-neutral-800]="scrolled()"
>
  <div class="max-w-5xl mx-auto px-6 h-16 flex items-center justify-between">
    <!-- Logo -->
    <a href="#" class="text-sm font-semibold tracking-tight text-neutral-900 dark:text-neutral-100">
      Gabriel<span class="text-sky-500">.</span>
    </a>

    <!-- Nav desktop -->
    <nav class="hidden md:flex items-center gap-6">
      @for (link of navLinks; track link.key) {
        <a
          [href]="link.href"
          class="text-sm text-neutral-500 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-100 transition-colors"
        >
          {{ link.key | translate }}
        </a>
      }
    </nav>

    <!-- Actions -->
    <div class="flex items-center gap-2">
      <!-- Lang toggle -->
      <button
        (click)="lang.toggle()"
        class="h-8 px-3 rounded-md text-xs font-medium text-neutral-500 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-100 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-all"
        [attr.aria-label]="'Trocar idioma'"
      >
        {{ lang.current() === 'pt' ? 'EN' : 'PT' }}
      </button>

      <!-- Theme toggle -->
      <button
        (click)="theme.toggle()"
        class="h-8 w-8 flex items-center justify-center rounded-md text-neutral-500 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-100 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-all"
        [attr.aria-label]="'Alternar tema'"
      >
        @if (theme.isDark()) {
          <!-- Sun icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="4" />
            <path
              d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"
            />
          </svg>
        } @else {
          <!-- Moon icon -->
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        }
      </button>

      <!-- Hamburger mobile -->
      <button
        (click)="toggleMenu()"
        class="md:hidden h-8 w-8 flex items-center justify-center rounded-md text-neutral-500 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-100 hover:bg-neutral-100 dark:hover:bg-neutral-800 transition-all"
        [attr.aria-label]="'Abrir menu'"
      >
        @if (menuOpen()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M18 6 6 18M6 6l12 12" />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="4" x2="20" y1="6" y2="6" />
            <line x1="4" x2="20" y1="12" y2="12" />
            <line x1="4" x2="20" y1="18" y2="18" />
          </svg>
        }
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  @if (menuOpen()) {
    <div
      class="md:hidden border-t border-neutral-200 dark:border-neutral-800 bg-white dark:bg-neutral-950 px-6 py-4 flex flex-col gap-4"
    >
      @for (link of navLinks; track link.key) {
        <a
          [href]="link.href"
          (click)="closeMenu()"
          class="text-sm text-neutral-600 hover:text-neutral-900 dark:text-neutral-400 dark:hover:text-neutral-100 transition-colors"
        >
          {{ link.key | translate }}
        </a>
      }
    </div>
  }
</header>
