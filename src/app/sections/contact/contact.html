<section id="contact" class="py-24 px-6 border-t border-neutral-100 dark:border-neutral-900">
  <div class="max-w-5xl mx-auto grid md:grid-cols-2 gap-16">
    <!-- Left: info -->
    <div class="flex flex-col gap-8">
      <div class="flex flex-col gap-2">
        <span class="text-xs font-medium text-sky-500 tracking-widest uppercase">
          {{ 'contact.title' | translate }}
        </span>
        <p class="text-sm text-neutral-500 dark:text-neutral-400">
          {{ 'contact.subtitle' | translate }}
        </p>
      </div>

      <div class="flex flex-col gap-4">
        <!-- Email -->
        <a href="mailto:gabriel.alvs19@gmail.com" class="flex items-center gap-3 group">
          <div
            class="w-9 h-9 rounded-lg bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center text-neutral-500 dark:text-neutral-400 group-hover:bg-sky-50 dark:group-hover:bg-sky-950 group-hover:text-sky-500 transition-all"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <rect width="20" height="16" x="2" y="4" rx="2" />
              <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7" />
            </svg>
          </div>
          <div class="flex flex-col">
            <span class="text-xs text-neutral-400 dark:text-neutral-500">Email</span>
            <span
              class="text-sm text-neutral-700 dark:text-neutral-300 group-hover:text-sky-500 transition-colors"
              >gabriel.alvs19@gmail.com</span
            >
          </div>
        </a>

        <!-- WhatsApp -->
        <a
          href="https://wa.me/5511975099439"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 group"
        >
          <div
            class="w-9 h-9 rounded-lg bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center text-neutral-500 dark:text-neutral-400 group-hover:bg-green-50 dark:group-hover:bg-green-950 group-hover:text-green-500 transition-all"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"
              />
            </svg>
          </div>
          <div class="flex flex-col">
            <span class="text-xs text-neutral-400 dark:text-neutral-500">WhatsApp</span>
            <span
              class="text-sm text-neutral-700 dark:text-neutral-300 group-hover:text-green-500 transition-colors"
              >(11) 97509-9439</span
            >
          </div>
        </a>

        <!-- LinkedIn -->
        <a
          href="https://www.linkedin.com/in/bielalves/"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 group"
        >
          <div
            class="w-9 h-9 rounded-lg bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center text-neutral-500 dark:text-neutral-400 group-hover:bg-sky-50 dark:group-hover:bg-sky-950 group-hover:text-sky-500 transition-all"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
              />
            </svg>
          </div>
          <div class="flex flex-col">
            <span class="text-xs text-neutral-400 dark:text-neutral-500">LinkedIn</span>
            <span
              class="text-sm text-neutral-700 dark:text-neutral-300 group-hover:text-sky-500 transition-colors"
              >linkedin.com/in/bielalves</span
            >
          </div>
        </a>

        <!-- GitHub -->
        <a
          href="https://github.com/GaelAlvs"
          target="_blank"
          rel="noopener noreferrer"
          class="flex items-center gap-3 group"
        >
          <div
            class="w-9 h-9 rounded-lg bg-neutral-100 dark:bg-neutral-800 flex items-center justify-center text-neutral-500 dark:text-neutral-400 group-hover:bg-neutral-200 dark:group-hover:bg-neutral-700 group-hover:text-neutral-900 dark:group-hover:text-neutral-100 transition-all"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path
                d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844a9.59 9.59 0 0 1 2.504.337c1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.02 10.02 0 0 0 22 12.017C22 6.484 17.522 2 12 2z"
              />
            </svg>
          </div>
          <div class="flex flex-col">
            <span class="text-xs text-neutral-400 dark:text-neutral-500">GitHub</span>
            <span
              class="text-sm text-neutral-700 dark:text-neutral-300 group-hover:text-neutral-900 dark:group-hover:text-neutral-100 transition-colors"
              >github.com/GaelAlvs</span
            >
          </div>
        </a>
      </div>
    </div>

    <!-- Right: form -->
    <div class="flex flex-col gap-4">
      @if (sent()) {
        <div class="flex flex-col items-center justify-center gap-3 h-full py-12 text-center">
          <div
            class="w-12 h-12 rounded-full bg-green-50 dark:bg-green-950 flex items-center justify-center text-green-500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M20 6 9 17l-5-5" />
            </svg>
          </div>
          <p class="text-sm font-medium text-neutral-900 dark:text-neutral-100">
            Mensagem enviada!
          </p>
          <p class="text-xs text-neutral-500 dark:text-neutral-400">Responderei em breve.</p>
        </div>
      } @else {
        <form (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-medium text-neutral-600 dark:text-neutral-400">
              {{ 'contact.name' | translate }}
            </label>
            <input
              type="text"
              [(ngModel)]="form.name"
              name="name"
              required
              class="h-10 px-3 rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-sm text-neutral-900 dark:text-neutral-100 placeholder:text-neutral-400 focus:outline-none focus:border-sky-400 dark:focus:border-sky-500 transition-colors"
              [placeholder]="'contact.name' | translate"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-medium text-neutral-600 dark:text-neutral-400">
              {{ 'contact.email' | translate }}
            </label>
            <input
              type="email"
              [(ngModel)]="form.email"
              name="email"
              required
              class="h-10 px-3 rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-sm text-neutral-900 dark:text-neutral-100 placeholder:text-neutral-400 focus:outline-none focus:border-sky-400 dark:focus:border-sky-500 transition-colors"
              [placeholder]="'contact.email' | translate"
            />
          </div>

          <div class="flex flex-col gap-1.5">
            <label class="text-xs font-medium text-neutral-600 dark:text-neutral-400">
              {{ 'contact.message' | translate }}
            </label>
            <textarea
              [(ngModel)]="form.message"
              name="message"
              required
              rows="5"
              class="px-3 py-2.5 rounded-lg border border-neutral-200 dark:border-neutral-700 bg-white dark:bg-neutral-900 text-sm text-neutral-900 dark:text-neutral-100 placeholder:text-neutral-400 focus:outline-none focus:border-sky-400 dark:focus:border-sky-500 transition-colors resize-none"
              [placeholder]="'contact.message' | translate"
            ></textarea>
          </div>

          <button
            type="submit"
            [disabled]="sending()"
            class="h-10 px-5 rounded-lg bg-neutral-900 dark:bg-neutral-100 text-white dark:text-neutral-900 text-sm font-medium hover:opacity-80 transition-opacity disabled:opacity-50 disabled:cursor-not-allowed self-start"
          >
            @if (sending()) {
              Enviando...
            } @else {
              {{ 'contact.send' | translate }}
            }
          </button>
        </form>
      }
    </div>
  </div>
</section>
